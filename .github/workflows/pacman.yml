name: Generate Contribution Animations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Snake Animation
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: letsmg
          outputs: |
            snake.svg
            snake-dark.svg?palette=github-dark

      # 👾 Pacman Animation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pacman generator
        run: npm install -g pacman-contribution-graph

      - name: Generate pacman animation
        run: |
          npx pacman-contribution-graph \
            --platform github \
            --gameTheme github-dark \
            --username letsmg \
            --output pacman-contribution-graph.svg \
            --width 800 \
            --height 200

      # � Commit and push animations
      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add files if they exist
          if [ -f "snake.svg" ]; then
            git add snake.svg
          fi
          if [ -f "snake-dark.svg" ]; then
            git add snake-dark.svg
          fi
          if [ -f "pacman-contribution-graph.svg" ]; then
            git add pacman-contribution-graph.svg
          fi
          
          # Commit if there are changes
          git diff --staged --quiet || git commit -m "🎮 Update contribution animations [skip ci]"
          
          # Push changes
          git push